<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Liftbrand ERP | Sovereign Blueprint</title>

    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#1e293b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Liftbrand">
    <link rel="apple-touch-icon" href="https://assets.cdn.filesafe.space/kStDsoJsyMuEVTowimeB/media/695e8653f4549a075dee967f.png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <!-- Quill.js for Rich Text (ClickUp Style) -->
    <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
    <script src="https://cdn.quilljs.com/1.3.6/quill.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap');
        
        :root { --brand: #7b2cbf; --brand-hover: #5a189a; --brand-light: #f3e8ff; --sidebar: #0f172a; --sidebar-hover: #1e293b; --bg: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: #334155; font-size: 14px; overflow: hidden; }
        h1, h2, h3, h4, .heading-font { font-family: 'Plus Jakarta Sans', sans-serif; letter-spacing: -0.02em; color: #0f172a; }
        
        .text-brand { color: var(--brand); } .bg-brand { background-color: var(--brand); color: white; }
        select, input, textarea { appearance: none; outline: none; }
        .hide-scrollbar::-webkit-scrollbar { display: none; } .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Sidebar Responsive Logic */
        #sidebar { position: fixed; height: 100vh; z-index: 50; transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); transform: translateX(-100%); }
        @media (min-width: 768px) { #sidebar { position: relative; transform: translateX(0); } #mobile-overlay { display: none !important; } }
        #sidebar.open { transform: translateX(0); }

        .sidebar-item { display: flex; items-center; gap: 0.75rem; padding: 0.75rem 1rem; border-radius: 0.5rem; color: #94a3b8; font-weight: 600; cursor: pointer; transition: all 0.2s; font-size: 13px; }
        .sidebar-item:hover { background-color: var(--sidebar-hover); color: #f8fafc; }
        .sidebar-item.active { background-color: var(--brand); color: white; }
        .sidebar-section-title { font-size: 10px; font-weight: 800; color: #475569; text-transform: uppercase; letter-spacing: 0.05em; padding: 1.5rem 1rem 0.5rem; }
        
        /* Task Cards */
        .task-card { transition: all 0.2s; border-left: 4px solid transparent; }
        .prio-urgent { border-left-color: #ef4444; } .prio-high { border-left-color: #f97316; }
        .prio-normal { border-left-color: #3b82f6; } .prio-low { border-left-color: #94a3b8; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
        
        .view-tab { border-bottom: 2px solid transparent; padding-bottom: 0.5rem; color: #64748b; font-weight: 700; cursor: pointer; font-size: 13px; }
        .view-tab.active { border-bottom-color: var(--brand); color: var(--brand); }

        /* Safe Area Support */
        .safe-top { padding-top: env(safe-area-inset-top); }
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }

        /* Full Screen Modals for Mobile */
        @media (max-width: 767px) {
            .modal-content { height: 100vh !important; width: 100% !important; max-width: 100% !important; border-radius: 0 !important; margin: 0 !important; }
            .ql-editor { min-height: 200px; }
        }
    </style>
</head>
<body class="flex h-screen w-screen overflow-hidden bg-white safe-top safe-bottom">

    <!-- MOBILE OVERLAY -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-40 hidden" onclick="toggleSidebar(false)"></div>

    <!-- LOGIN SCREEN -->
    <div id="view-login" class="fixed inset-0 bg-[#0f172a] z-[100] flex flex-col items-center justify-center p-6">
        <div class="bg-white p-8 md:p-10 max-w-sm w-full text-center rounded-2xl shadow-2xl relative overflow-hidden">
            <div class="absolute top-0 left-0 w-full h-1.5 bg-brand"></div>
            <img src="https://assets.cdn.filesafe.space/kStDsoJsyMuEVTowimeB/media/695e8653f4549a075dee967f.png" alt="Liftbrand" class="h-16 mx-auto mb-6 object-contain">
            <h2 class="text-2xl font-bold text-slate-900 mb-2">Liftbrand ERP</h2>
            <p class="text-sm text-slate-500 mb-8">Access Secure Agency Portal</p>
            
            <button id="btn-login-google" onclick="loginWithGoogle()" class="w-full bg-slate-900 text-white font-bold py-4 rounded-xl flex items-center justify-center gap-3 active:scale-95 transition-all">
                <i class="fab fa-google"></i> Login with Google
            </button>
            <div id="login-spinner" class="hidden mt-4 text-sm font-bold text-brand animate-pulse">Establishing Connection...</div>
            <div id="login-error" class="hidden mt-4 text-xs font-bold text-red-500 bg-red-50 p-3 rounded-lg border border-red-100"></div>
        </div>
    </div>

    <!-- MAIN APP LAYOUT -->
    <div id="app-wrapper" class="hidden flex h-full w-full">
        
        <!-- SIDEBAR (Fixed/Drawer) -->
        <div id="sidebar" class="w-72 bg-[var(--sidebar)] text-slate-300 flex flex-col flex-shrink-0 shadow-2xl overflow-y-auto hide-scrollbar">
            <div class="p-6 flex items-center justify-between border-b border-slate-800">
                <div class="flex items-center gap-3">
                    <div class="w-8 h-8 bg-brand rounded-lg flex items-center justify-center text-white font-black text-xs">LB</div>
                    <span class="text-sm font-bold text-white">Liftbrand</span>
                </div>
                <button class="md:hidden text-slate-500" onclick="toggleSidebar(false)"><i class="fas fa-times"></i></button>
            </div>

            <div class="flex-1 px-3 py-4 space-y-1">
                <div onclick="switchMainView('home')" id="nav-home" class="sidebar-item active"><i class="fas fa-home w-5"></i> Home</div>
                <div onclick="switchMainView('notifications')" id="nav-notif" class="sidebar-item"><i class="fas fa-bell w-5"></i> Inbox</div>
                <div onclick="switchMainView('docs')" id="nav-docs" class="sidebar-item"><i class="fas fa-file-alt w-5"></i> Docs</div>
                
                <div class="sidebar-section-title">Operations</div>
                <div id="spaces-list-sidebar" class="space-y-1">
                    <!-- Spaces injected -->
                </div>

                <button onclick="showCreateSpaceModal()" class="sidebar-item !text-slate-500 hover:!text-white mt-4 w-full">
                    <i class="fas fa-plus-circle w-5"></i> New Space
                </button>
            </div>

            <div class="p-4 border-t border-slate-800 bg-slate-900/50" onclick="handleSignOut()">
                <div class="flex items-center gap-3 p-2 cursor-pointer hover:bg-slate-800 rounded-lg transition">
                    <div id="user-pill-avatar" class="w-8 h-8 bg-brand text-white rounded flex items-center justify-center text-xs font-bold">U</div>
                    <div class="min-w-0 flex-1">
                        <p id="user-pill-name" class="text-xs font-bold text-white truncate">User Name</p>
                        <p class="text-[10px] text-slate-500 font-bold uppercase">Admin</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- MAIN CONTENT AREA -->
        <div class="flex-1 flex flex-col h-full bg-[#f8fafc] overflow-hidden">
            
            <!-- HEADER / TOPBAR -->
            <div class="h-14 md:h-16 bg-white border-b border-slate-200 flex items-center justify-between px-4 md:px-6 z-20 flex-shrink-0">
                <div class="flex items-center gap-3 md:gap-6">
                    <button class="md:hidden w-10 h-10 flex items-center justify-center text-slate-500 text-lg" onclick="toggleSidebar(true)"><i class="fas fa-bars"></i></button>
                    <h2 class="text-sm md:text-base font-bold text-slate-800 truncate max-w-[150px] md:max-w-none" id="topbar-title">Home</h2>
                </div>
                <div class="flex items-center gap-2">
                    <div id="topbar-view-tabs" class="hidden md:flex items-center gap-6 mr-6">
                        <div class="view-tab active" onclick="switchTaskView('list')" id="tab-list">List</div>
                        <div class="view-tab" onclick="switchTaskView('board')" id="tab-board">Board</div>
                    </div>
                    <button onclick="showTaskModal()" id="btn-topbar-new-task" class="hidden bg-brand text-white px-3 md:px-4 py-1.5 rounded-lg font-bold text-xs shadow-sm"><i class="fas fa-plus mr-1"></i> Task</button>
                </div>
            </div>

            <!-- VIEW CONTAINER -->
            <div class="flex-1 overflow-y-auto relative p-4 md:p-6">
                
                <!-- MOBILE HOME VIEW -->
                <div id="view-home" class="max-w-5xl mx-auto space-y-6">
                    <div class="flex flex-col md:flex-row justify-between items-start md:items-end gap-4">
                        <div>
                            <h1 class="text-2xl md:text-3xl font-bold text-slate-900" id="home-greeting">Hello.</h1>
                            <p class="text-sm text-slate-500 font-medium">Agency status overview.</p>
                        </div>
                        <button onclick="switchMainView('client-onboarding')" class="w-full md:w-auto bg-slate-900 text-white px-6 py-3 rounded-xl font-bold text-sm shadow-md active:scale-95 transition">
                            <i class="fas fa-user-plus mr-2"></i> Onboard Client
                        </button>
                    </div>

                    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                        <!-- My Work -->
                        <div class="lg:col-span-2 space-y-4">
                            <div class="bg-white rounded-xl border border-slate-200 shadow-sm">
                                <div class="p-4 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                                    <h3 class="font-bold text-sm text-slate-800">My Tasks</h3>
                                    <span class="bg-brand text-white text-[10px] px-2 py-0.5 rounded-full font-black" id="home-tasks-count">0</span>
                                </div>
                                <div id="home-my-tasks-list" class="divide-y divide-slate-50">
                                    <!-- Tasks list -->
                                </div>
                            </div>
                        </div>

                        <!-- Action Center -->
                        <div class="space-y-4">
                            <div class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
                                <div class="p-4 border-b border-slate-100 bg-slate-900 text-white">
                                    <h3 class="font-bold text-xs uppercase tracking-widest"><i class="fas fa-bolt text-amber-400 mr-2"></i> Action Center</h3>
                                </div>
                                <div id="home-alerts-container" class="divide-y divide-slate-50">
                                    <!-- Alerts list -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- VIEW: TASKS -->
                <div id="view-tasks" class="hidden h-full flex flex-col">
                    <!-- Mobile view toggle for task list vs board -->
                    <div class="md:hidden flex bg-slate-100 p-1 rounded-lg mb-4">
                        <button onclick="switchTaskView('list')" id="m-tab-list" class="flex-1 py-1.5 text-xs font-bold rounded-md bg-white text-brand shadow-sm">List</button>
                        <button onclick="switchTaskView('board')" id="m-tab-board" class="flex-1 py-1.5 text-xs font-bold text-slate-500">Board</button>
                    </div>

                    <div id="tasks-list-layout" class="flex-1 bg-white border border-slate-200 rounded-xl overflow-hidden flex flex-col">
                        <div id="tasks-list-container" class="flex-1 overflow-y-auto divide-y divide-slate-100">
                            <!-- Injected Tasks -->
                        </div>
                    </div>

                    <div id="tasks-board-layout" class="hidden flex-1 overflow-x-auto flex gap-4 pb-6">
                        <!-- Board Columns -->
                    </div>
                </div>

                <!-- VIEW: DOCS -->
                <div id="view-docs" class="hidden max-w-6xl mx-auto space-y-6">
                    <div class="flex justify-between items-center">
                        <h3 class="text-xl font-bold text-slate-800">Documents</h3>
                        <button onclick="showDocModal()" class="bg-slate-900 text-white px-4 py-2 rounded-lg font-bold text-xs"><i class="fas fa-plus"></i></button>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4" id="docs-grid"></div>
                </div>

                <!-- VIEW: ONBOARDING -->
                <div id="view-client-onboarding" class="hidden max-w-2xl mx-auto">
                    <div class="bg-white p-6 md:p-10 rounded-2xl border border-slate-200 shadow-xl space-y-6">
                        <h2 class="text-2xl font-bold text-slate-900">Initialize Client</h2>
                        <input type="text" id="new-client-name" placeholder="Client Name" class="w-full p-4 bg-slate-50 border rounded-xl font-bold">
                        <input type="date" id="new-client-signup" class="w-full p-4 bg-slate-50 border rounded-xl font-bold text-brand">
                        
                        <div class="space-y-3">
                            <label class="block p-4 border-2 border-brand bg-brand-light/30 rounded-xl cursor-pointer">
                                <input type="radio" name="tier_selection" value="foundation" class="hidden" checked>
                                <h4 class="font-bold">Foundation ($299)</h4>
                                <p class="text-xs text-slate-500">Essential setup.</p>
                            </label>
                            <label class="block p-4 border-2 border-slate-200 rounded-xl cursor-pointer">
                                <input type="radio" name="tier_selection" value="growth" class="hidden">
                                <h4 class="font-bold">Growth ($450)</h4>
                                <p class="text-xs text-slate-500">Advanced scaling.</p>
                            </label>
                        </div>
                        <button onclick="commitNewClient()" class="w-full py-4 bg-slate-900 text-white rounded-xl font-bold active:bg-brand">Create Client Workspace</button>
                    </div>
                </div>

            </div>
        </div>
    </div>

    <!-- MODAL OVERLAY -->
    <div id="modal-overlay" class="fixed inset-0 bg-slate-900/70 hidden flex justify-center z-50 backdrop-blur-sm overflow-y-auto">
        
        <!-- TASK MODAL (Fullscreen Mobile) -->
        <div id="modal-task" class="hidden modal-content bg-white shadow-2xl w-full max-w-5xl flex flex-col md:flex-row overflow-hidden my-auto md:h-[80vh] md:rounded-2xl">
            <div class="flex-1 flex flex-col bg-white overflow-y-auto">
                <div class="p-4 border-b border-slate-100 flex items-center justify-between sticky top-0 bg-white z-10">
                    <div class="flex items-center gap-3">
                        <select id="task-status" class="px-3 py-1 bg-slate-100 rounded text-[10px] font-black uppercase outline-none"></select>
                        <span class="text-xs text-slate-400 font-mono" id="task-id-display">#NEW</span>
                    </div>
                    <button onclick="closeModals()" class="p-2 text-slate-400"><i class="fas fa-times text-lg"></i></button>
                </div>
                
                <div class="p-6 md:p-8 space-y-6">
                    <input type="text" id="task-title" placeholder="Task Name" class="w-full text-2xl font-bold text-slate-900 outline-none">
                    
                    <div class="grid grid-cols-2 gap-4 bg-slate-50 p-4 rounded-xl">
                        <div>
                            <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Assignee</label>
                            <select id="task-assignee" class="w-full bg-transparent text-sm font-bold text-slate-700"></select>
                        </div>
                        <div>
                            <label class="block text-[9px] font-bold text-slate-400 uppercase mb-1">Due Date</label>
                            <input type="date" id="task-due" class="w-full bg-transparent text-sm font-bold text-brand">
                        </div>
                    </div>

                    <div id="quill-task-desc" class="bg-white rounded-xl border border-slate-200"></div>

                    <div class="space-y-3">
                        <h4 class="font-bold text-sm">Subtasks</h4>
                        <div id="subtasks-container" class="space-y-2"></div>
                        <div class="flex gap-2">
                            <input type="text" id="new-subtask-input" placeholder="Add subtask..." class="flex-1 p-3 bg-slate-50 border rounded-xl text-sm">
                            <button onclick="addSubtask()" class="bg-slate-200 px-4 rounded-xl font-bold text-xs">Add</button>
                        </div>
                    </div>
                </div>

                <div class="p-4 border-t border-slate-100 bg-white mt-auto sticky bottom-0">
                    <button onclick="saveTask()" class="w-full bg-brand text-white py-4 rounded-xl font-bold shadow-lg">Save Changes</button>
                    <button onclick="deleteTaskBtn()" id="btn-delete-task" class="w-full text-red-500 font-bold text-xs mt-4 hidden">Delete Task</button>
                </div>
            </div>
        </div>

        <!-- DOC MODAL -->
        <div id="modal-doc" class="hidden modal-content bg-white shadow-2xl w-full max-w-4xl flex flex-col my-auto md:h-[90vh] md:rounded-2xl">
            <div class="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-10">
                <span class="text-xs font-bold text-slate-400">DOC EDITOR</span>
                <button onclick="closeModals()" class="p-2"><i class="fas fa-times text-lg"></i></button>
            </div>
            <div class="flex-1 overflow-y-auto p-4 md:p-10">
                <input type="text" id="doc-title-input" placeholder="Untitled" class="w-full text-3xl font-black text-slate-900 mb-6 border-none outline-none">
                <div id="quill-doc-editor"></div>
            </div>
            <div class="p-4 border-t bg-slate-50 flex justify-end">
                <button onclick="saveDocument()" class="bg-slate-900 text-white px-8 py-3 rounded-xl font-bold shadow-lg">Save Doc</button>
            </div>
        </div>

    </div>

    <!-- SCRIPTS -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, remove, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
        import { getAuth, signInWithPopup, signInWithRedirect, getRedirectResult, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAYnKMSoja6Q9pRgdj303IdxnxFoH-TVEw",
            authDomain: "liftbrand-s--sops.firebaseapp.com",
            projectId: "liftbrand-s--sops",
            databaseURL: "https://liftbrand-s--sops-default-rtdb.firebaseio.com",
            storageBucket: "liftbrand-s--sops.firebasestorage.app",
            messagingSenderId: "699084171927",
            appId: "1:699084171927:web:3f340d5be748c9b35b97d2"
        };

        let app, db, auth;
        let clients = [], team = [], tasks = [], docs = [], spaces = [];
        let currentUser = null; 
        let activeView = 'home';
        let activeSpaceId = null;
        let activeTaskView = 'list';
        let quillTask, quillDoc;

        async function init() {
            try {
                app = initializeApp(firebaseConfig);
                db = getDatabase(app);
                auth = getAuth(app);

                quillTask = new Quill('#quill-task-desc', { theme: 'snow', modules: { toolbar: [['bold', 'italic'], [{list:'ordered'}, {list:'bullet'}]] }});
                quillDoc = new Quill('#quill-doc-editor', { theme: 'snow', modules: { toolbar: [[{header:[1,2,false]}], ['bold', 'italic'], [{list:'check'}, {list:'bullet'}], ['image', 'link']] }});

                getRedirectResult(auth).catch(err => {
                    document.getElementById('login-error').innerText = err.message;
                    document.getElementById('login-error').classList.remove('hidden');
                });

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        const snapshot = await get(ref(db, 'team'));
                        const members = Object.values(snapshot.val() || {});
                        const isHardcodedAdmin = user.email === 'ishamughal2004@gmail.com' || user.email === 'ismaeelahmad100@gmail.com';
                        const dbUser = members.find(m => m.email.toLowerCase() === user.email.toLowerCase());

                        if (dbUser || isHardcodedAdmin) {
                            currentUser = { uid: user.uid, email: user.email, name: dbUser ? dbUser.name : user.displayName || 'Admin', isAdmin: isHardcodedAdmin || dbUser?.isAdmin };
                            document.getElementById('view-login').classList.add('hidden');
                            document.getElementById('app-wrapper').classList.remove('hidden');
                            document.getElementById('user-pill-name').innerText = currentUser.name;
                            document.getElementById('user-pill-avatar').innerText = currentUser.name.charAt(0);
                            document.getElementById('home-greeting').innerText = `Hello, ${currentUser.name.split(' ')[0]}.`;
                            listenToData();
                            switchMainView('home');
                        } else {
                            signOut(auth);
                            document.getElementById('login-error').innerText = "Unauthorized email.";
                            document.getElementById('login-error').classList.remove('hidden');
                        }
                    } else {
                        document.getElementById('view-login').classList.remove('hidden');
                        document.getElementById('app-wrapper').classList.add('hidden');
                    }
                });
            } catch(e) { console.error(e); }
        }

        window.loginWithGoogle = () => {
            const provider = new GoogleAuthProvider();
            const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
            const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;
            if (isIOS && isStandalone) {
                document.getElementById('btn-login-google').classList.add('hidden');
                document.getElementById('login-spinner').classList.remove('hidden');
                signInWithRedirect(auth, provider);
            } else {
                signInWithPopup(auth, provider).catch(() => signInWithRedirect(auth, provider));
            }
        };

        window.handleSignOut = () => { if(confirm('Logout?')) signOut(auth); };

        function listenToData() {
            onValue(ref(db, '/'), snapshot => {
                const data = snapshot.val() || {};
                clients = data.clients ? Object.values(data.clients) : [];
                team = data.team ? Object.values(data.team) : [];
                tasks = data.tasks ? Object.values(data.tasks) : [];
                docs = data.docs ? Object.values(data.docs) : [];
                spaces = data.spaces ? Object.values(data.spaces) : [];
                renderSidebar();
                updateHomeView();
                if(activeView === 'tasks') renderTasks();
                if(activeView === 'docs') renderDocsGrid();
            });
        }

        window.toggleSidebar = (show) => {
            const s = document.getElementById('sidebar');
            const o = document.getElementById('mobile-overlay');
            if(show) { s.classList.add('open'); o.classList.remove('hidden'); }
            else { s.classList.remove('open'); o.classList.add('hidden'); }
        };

        function renderSidebar() {
            document.getElementById('spaces-list-sidebar').innerHTML = spaces.map(s => `
                <div onclick="openSpace('${s.id}')" class="sidebar-item ${activeSpaceId === s.id ? 'active' : ''}">
                    <i class="fas fa-folder w-5 text-amber-400"></i> ${s.name}
                </div>
            `).join('');
            const tOpts = `<option value="">Unassigned</option>` + team.map(t => `<option value="${t.email}">${t.name}</option>`).join('');
            document.getElementById('task-assignee').innerHTML = tOpts;
        }

        window.openSpace = (id) => {
            activeSpaceId = id;
            const s = spaces.find(x => x.id === id);
            document.getElementById('topbar-title').innerText = s.name;
            switchMainView('tasks');
            toggleSidebar(false);
        };

        window.switchMainView = (view) => {
            activeView = view;
            ['home', 'tasks', 'docs', 'client-onboarding'].forEach(v => document.getElementById(`view-${v}`).classList.add('hidden'));
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            document.getElementById('topbar-view-tabs').classList.add('hidden');
            document.getElementById('btn-topbar-new-task').classList.add('hidden');
            if(view === 'home') {
                document.getElementById('view-home').classList.remove('hidden');
                document.getElementById('nav-home').classList.add('active');
                document.getElementById('topbar-title').innerText = 'Home';
            } else if (view === 'tasks') {
                document.getElementById('view-tasks').classList.remove('hidden');
                document.getElementById('topbar-view-tabs').classList.remove('hidden');
                document.getElementById('btn-topbar-new-task').classList.remove('hidden');
                renderTasks();
            } else if (view === 'docs') {
                document.getElementById('view-docs').classList.remove('hidden');
                document.getElementById('nav-docs').classList.add('active');
                document.getElementById('topbar-title').innerText = 'Docs';
                renderDocsGrid();
            } else if (view === 'client-onboarding') {
                document.getElementById('view-client-onboarding').classList.remove('hidden');
                document.getElementById('topbar-title').innerText = 'New Client';
            }
            toggleSidebar(false);
        };

        function updateHomeView() {
            const myTasks = tasks.filter(t => t.assigneeEmail === currentUser.email && t.status !== 'done');
            document.getElementById('home-tasks-count').innerText = myTasks.length;
            document.getElementById('home-my-tasks-list').innerHTML = myTasks.map(t => `
                <div class="p-4 flex items-center justify-between border-b border-slate-50 active:bg-slate-50" onclick="showTaskModal('${t.id}')">
                    <div class="flex items-center gap-3">
                        <div class="w-4 h-4 rounded-full border-2 border-slate-300"></div>
                        <span class="font-bold text-slate-800">${t.title}</span>
                    </div>
                    <span class="text-[9px] font-black uppercase text-slate-400">${t.status}</span>
                </div>
            `).join('');
        }

        function renderTasks() {
            let filtered = tasks;
            if(activeSpaceId) filtered = tasks.filter(t => t.spaceId === activeSpaceId);
            
            document.getElementById('m-tab-list').className = activeTaskView === 'list' ? 'flex-1 py-1.5 text-xs font-bold rounded-md bg-white text-brand shadow-sm' : 'flex-1 py-1.5 text-xs font-bold text-slate-500';
            document.getElementById('m-tab-board').className = activeTaskView === 'board' ? 'flex-1 py-1.5 text-xs font-bold rounded-md bg-white text-brand shadow-sm' : 'flex-1 py-1.5 text-xs font-bold text-slate-500';

            if(activeTaskView === 'list') {
                document.getElementById('tasks-list-layout').classList.remove('hidden');
                document.getElementById('tasks-board-layout').classList.add('hidden');
                document.getElementById('tasks-list-container').innerHTML = filtered.map(t => `
                    <div class="p-4 active:bg-slate-50 transition" onclick="showTaskModal('${t.id}')">
                        <div class="flex justify-between items-start mb-2">
                            <span class="text-[10px] font-bold text-brand uppercase">${t.status}</span>
                            <span class="text-[10px] bg-slate-100 px-2 py-0.5 rounded font-black uppercase">${t.priority}</span>
                        </div>
                        <h4 class="font-bold text-slate-800">${t.title}</h4>
                        <div class="flex items-center justify-between mt-3 text-xs text-slate-400">
                            <span><i class="far fa-user mr-1"></i> ${team.find(x=>x.email===t.assigneeEmail)?.name.split(' ')[0] || 'Unassigned'}</span>
                            <span><i class="far fa-calendar-alt mr-1"></i> ${t.dueDate || 'No Date'}</span>
                        </div>
                    </div>`).join('');
            } else {
                document.getElementById('tasks-list-layout').classList.add('hidden');
                document.getElementById('tasks-board-layout').classList.remove('hidden');
                const cols = {todo:[],inprogress:[],done:[]};
                filtered.forEach(t => { if(cols[t.status]) cols[t.status].push(t); else cols.todo.push(t); });
                document.getElementById('tasks-board-layout').innerHTML = ['todo','inprogress','done'].map(s => `
                    <div class="w-72 flex-shrink-0 space-y-3">
                        <h5 class="text-xs font-bold uppercase text-slate-400 pl-2">${s} (${cols[s].length})</h5>
                        ${cols[s].map(t => `<div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm task-card prio-${t.priority}" onclick="showTaskModal('${t.id}')">
                            <p class="font-bold text-slate-800 text-sm">${t.title}</p>
                        </div>`).join('')}
                    </div>`).join('');
            }
        }

        window.switchTaskView = (v) => { activeTaskView = v; renderTasks(); };

        window.showTaskModal = (id = null) => {
            document.getElementById('task-id').value = id || '';
            document.getElementById('task-id-display').innerText = id ? `#${id.substring(id.length-4)}` : '#NEW';
            const statuses = ['todo', 'inprogress', 'done'];
            document.getElementById('task-status').innerHTML = statuses.map(s => `<option value="${s}">${s.toUpperCase()}</option>`).join('');
            if(id) {
                const t = tasks.find(x => x.id === id);
                document.getElementById('task-title').value = t.title;
                document.getElementById('task-status').value = t.status;
                document.getElementById('task-assignee').value = t.assigneeEmail || '';
                document.getElementById('task-due').value = t.dueDate || '';
                document.getElementById('task-priority').value = t.priority || 'normal';
                quillTask.root.innerHTML = t.desc || '';
                document.getElementById('btn-delete-task').classList.remove('hidden');
            } else {
                document.getElementById('task-title').value = '';
                document.getElementById('task-status').value = 'todo';
                document.getElementById('task-assignee').value = '';
                quillTask.root.innerHTML = '';
                document.getElementById('btn-delete-task').classList.add('hidden');
            }
            openModal('modal-task');
        };

        window.saveTask = () => {
            const id = document.getElementById('task-id').value || `t_${Date.now()}`;
            if(!document.getElementById('task-title').value) return;
            set(ref(db, `tasks/${id}`), {
                id, title: document.getElementById('task-title').value,
                status: document.getElementById('task-status').value,
                assigneeEmail: document.getElementById('task-assignee').value,
                dueDate: document.getElementById('task-due').value,
                priority: document.getElementById('task-priority').value,
                spaceId: activeSpaceId || 'internal',
                desc: quillTask.root.innerHTML,
                updatedAt: Date.now()
            });
            closeModals();
        };

        window.deleteTaskBtn = () => { if(confirm("Delete?")) { remove(ref(db, `tasks/${document.getElementById('task-id').value}`)); closeModals(); } };

        window.showDocModal = () => { document.getElementById('doc-title-input').value = ''; quillDoc.root.innerHTML = ''; openModal('modal-doc'); };
        window.saveDocument = () => {
            const title = document.getElementById('doc-title-input').value.trim();
            if(!title) return;
            const id = `doc_${Date.now()}`;
            set(ref(db, `docs/${id}`), { id, title, content: quillDoc.root.innerHTML, createdBy: currentUser.name, ts: Date.now() });
            closeModals();
        };
        function renderDocsGrid() {
            document.getElementById('docs-grid').innerHTML = docs.map(d => `<div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm active:scale-95 transition" onclick="viewDoc('${d.id}')">
                <div class="w-10 h-10 bg-slate-50 rounded flex items-center justify-center text-slate-400 mb-4"><i class="fas fa-file-alt"></i></div>
                <h4 class="font-bold text-slate-900 truncate">${d.title}</h4>
                <p class="text-[10px] text-slate-400 font-bold uppercase mt-1">BY ${d.createdBy.split(' ')[0]}</p>
            </div>`).join('');
        }
        window.viewDoc = (id) => {
            const d = docs.find(x => x.id === id);
            document.getElementById('doc-title-input').value = d.title;
            quillDoc.root.innerHTML = d.content;
            openModal('modal-doc');
        };

        window.commitNewClient = () => {
            const name = document.getElementById('new-client-name').value;
            const date = document.getElementById('new-client-signup').value;
            if(!name || !date) return alert("Fill details.");
            const spaceId = `space_${Date.now()}`;
            set(ref(db, `spaces/${spaceId}`), { id: spaceId, name: `${name} | ONBOARDING` });
            switchMainView('home');
        };

        window.openModal = (id) => {
            document.getElementById('modal-overlay').classList.remove('hidden');
            document.getElementById(id).classList.remove('hidden');
        };
        window.closeModals = () => {
            document.getElementById('modal-overlay').classList.add('hidden');
            document.querySelectorAll('.modal-content').forEach(d => d.classList.add('hidden'));
        };
        window.showCreateSpaceModal = () => { const n = prompt("Space Name:"); if(n) set(ref(db, `spaces/space_${Date.now()}`), { id: `space_${Date.now()}`, name: n }); };

        init();
    </script>
</body>
</html>
